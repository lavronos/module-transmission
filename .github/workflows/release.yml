name: Build and release module

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout module
        uses: actions/checkout@v4

      - name: Package module ZIP
        run: node scripts/package.mjs

      - name: Upload module package
        uses: actions/upload-artifact@v4
        with:
          name: transmission-module
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download module package
        uses: actions/download-artifact@v4
        with:
          name: transmission-module
          path: dist

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
          fi

  publish-marketplace:
    name: Publish to LavronOS Marketplace
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Download module package
        uses: actions/download-artifact@v4
        with:
          name: transmission-module
          path: dist

      - name: Import approved package
        env:
          MARKETPLACE_URL: ${{ secrets.LAVRONOS_MARKETPLACE_URL }}
          MARKETPLACE_USER: ${{ secrets.LAVRONOS_MARKETPLACE_USER }}
          MARKETPLACE_APPLICATION_PASSWORD: ${{ secrets.LAVRONOS_MARKETPLACE_APPLICATION_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$MARKETPLACE_URL" ] || [ -z "$MARKETPLACE_USER" ] || [ -z "$MARKETPLACE_APPLICATION_PASSWORD" ]; then
            echo "::notice::Marketplace publishing is not configured for this repository."
            exit 0
          fi
          package="$(find dist -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -n "$package"
          curl --fail-with-body --silent --show-error \
            --user "$MARKETPLACE_USER:$MARKETPLACE_APPLICATION_PASSWORD" \
            --form "module_zip=@$package;type=application/zip" \
            "${MARKETPLACE_URL%/}/wp-json/lavronos/v1/admin/modules/import"
